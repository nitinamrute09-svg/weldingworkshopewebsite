{% extends 'base.html' %}

{% block title %}Our Gallery | RK Welding Workshop{% endblock %}

{% block content %}
<style>
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
    }
    
    .gallery-item {
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        aspect-ratio: 4/3;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }
    
    .gallery-item:hover img {
        transform: scale(1.1);
    }
    
    .gallery-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        padding: 2rem 1rem 1rem;
        color: white;
        transform: translateY(100%);
        transition: transform 0.3s ease;
    }
    
    .gallery-item:hover .gallery-overlay {
        transform: translateY(0);
    }
    
    .gallery-overlay h3 {
        margin: 0;
        font-size: 1.2rem;
        color: var(--primary-color);
    }
</style>

<!-- Page Header -->
<section style="padding: 120px 0 60px; background-color: var(--dark-bg); color: white; text-align: center;">
    <div class="container">
        <h1 style="font-size: 3rem; color: var(--primary-color);">Our Gallery</h1>
        <p style="font-size: 1.2rem;">Take a look at some of our recent metal fabrication projects.</p>
    </div>
</section>

<section style="padding: 5rem 0; background-color: var(--light-bg);">
    <div class="container">
        <div class="gallery-grid">
            
            {% for image in images %}
            <div class="gallery-item animate">
                <img src="{{ url_for('static', filename='images/gallery_uploads/' + image.filename) }}" alt="{{ image.title }}">
                <div class="gallery-overlay">
                    <h3>{{ image.title }}</h3>
                </div>
            </div>
            {% endfor %}
            
        </div>
    </div>
</section>
{% endblock %}
